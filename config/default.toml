# Yapper default configuration
# Copy to ~/.config/yapper/config.toml and customize

[audio]
# device = "EasyCam"  # substring match, or null for PipeWire default
sample_rate = 16000
channels = 1

[transcriber]
model = "small.en"
device = "cpu"
compute_type = "int8"
cpu_threads = 8
beam_size = 5
vad_filter = true
language = "en"

[processor]
enabled = false  # enable after setting up llama-server
api_url = "http://127.0.0.1:8080"
model = "qwen3-0.6b"
temperature = 0.3
max_tokens = 1024
min_text_length = 10
timeout = 10.0

[injector]
method = "auto"  # auto | wtype | ydotool | clipboard
clipboard_threshold = 200
clipboard_paste_delay = 0.05
typing_delay = 0

[notification]
enabled = true
timeout = 2000

[daemon]
# socket_path = ""  # empty = $XDG_RUNTIME_DIR/yapper.sock
debounce_ms = 200
log_level = "INFO"

[dictionary]
enabled = false
# path = ""  # empty = ~/.config/yapper/dictionary.txt

[formatter]
enabled = true

[streaming]
enabled = true
silence_duration_ms = 500    # silence gap to end a speech segment
min_speech_duration_ms = 250 # discard speech shorter than this
speech_threshold = 0.5       # VAD probability threshold
speech_pad_ms = 100          # padding around speech segments
skip_llm = true              # skip LLM in streaming for low latency
