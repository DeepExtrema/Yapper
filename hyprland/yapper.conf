# Yapper keybinds for Hyprland
# Source this from your hyprland.conf:
#   source = ~/.config/hypr/yapper.conf

# Push-to-talk: Hold Insert to record, release to stop
bind = , Insert, exec, ~/.local/bin/yapper-ctl start
bindr = , Insert, exec, ~/.local/bin/yapper-ctl stop

# Toggle mode: Press Super+Alt+V to start/stop recording
bind = SUPER ALT, V, exec, ~/.local/bin/yapper-ctl toggle
